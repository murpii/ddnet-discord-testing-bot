# Example configuration. Copy this file to config.ini and fill in your own values.

[AUTH]
# Your Discord bot token (Developer Portal -> your app -> Bot -> Reset Token).
TOKEN_DISCORD = token

[DDNET]
# API token for the DDNet upload/delete endpoints.
# Leave blank unless you have one.
TOKEN = token
UPLOAD = upload-point-url
DELETE = delete-point-url

[DATABASE]
# MariaDB/MySQL connection used by the bot.
MARIADB_USER = teeworlds
MARIADB_PASSWORD = password
MARIADB_DB = database
MARIADB_HOST = localhost ; default
MARIADB_PORT = 3306 ; default

[TESTING_CHANNELS]
# Map rendering (thumbnails + visual diffs) needs a GPU or a software rasterizer.
# Set to false on hosts without one: the bot then skips thumbnails and the visual-diff
# button, but the text diff summary still works.
RENDERING = true

# Comma-separated channel IDs to skip when loading testing channels
EXCLUDE = 111111,222222,333333

# Where archived testlogs are written, in the layout the ddnet-map-testing-log
TESTLOG_DIR = data/map-testing/testlogs

# Also push the archived testlog + assets to the DDNet upload endpoint.
# Keep off for local testing.
TESTLOG_UPLOAD = false

# Delete the channel after a successful archive.
# Keep off while testing so archiving doesn't destroy the channel.
TESTLOG_DELETE_ON_ARCHIVE = false
